name: browser-main-flows

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  browser-main-flows:
    runs-on: ubuntu-latest
    timeout-minutes: 32
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/ms-playwright
    steps:
      - name: Check out repository
        timeout-minutes: 1
        uses: actions/checkout@v4
      - name: Set up Node.js
        timeout-minutes: 1
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install npm dependencies
        timeout-minutes: 2
        run: node workbench/scripts/run-browser-main-flows-ci.mjs npm-dependencies
      - name: Resolve Playwright cache identity
        id: playwright-cache-key
        timeout-minutes: 1
        run: node workbench/scripts/run-browser-main-flows-ci.mjs cache-key
      - name: Restore Playwright browser cache
        id: playwright-browser-cache
        timeout-minutes: 2
        uses: actions/cache@v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: ${{ runner.os }}-${{ runner.arch }}-${{ steps.playwright-cache-key.outputs.key }}
      - name: Install Playwright system dependencies
        timeout-minutes: 9
        run: node workbench/scripts/run-browser-main-flows-ci.mjs system-dependencies
      - name: Download and install Playwright Chromium
        if: steps.playwright-browser-cache.outputs.cache-hit != 'true'
        timeout-minutes: 4
        run: node workbench/scripts/run-browser-main-flows-ci.mjs browser-install
      - name: Verify Playwright Chromium installation
        timeout-minutes: 1
        run: node workbench/scripts/run-browser-main-flows-ci.mjs browser-verify
      - name: Run browser main flows
        id: browser-tests
        timeout-minutes: 5
        run: node workbench/scripts/run-browser-main-flows-ci.mjs browser-tests
      - name: Upload browser diagnostics
        if: always() && !cancelled()
        timeout-minutes: 2
        uses: actions/upload-artifact@v4
        with:
          name: browser-main-flows-diagnostics
          path: |
            .tmp/browser-main-flows-ci/
            .tmp/browser-main-flows/
          if-no-files-found: ignore
          retention-days: 7
