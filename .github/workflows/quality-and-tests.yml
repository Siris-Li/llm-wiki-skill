name: quality-and-tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality-and-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run quality-and-tests
      - name: Upload cleaned failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: quality-and-tests-failure
          path: .tmp/quality-and-tests/failure.log
          if-no-files-found: ignore
          retention-days: 7
